  T6={planId:null,dayId:null,stage:'read',readArts:[],readIdx:0,newQueue:[],reviewQueue:[],idx:0,results:{new:[],review:[]}};
}
resetT6State();

function getPlans(){return JSON.parse(localStorage.getItem(PLANS_KEY)||'[]');}
function setPlans(plans){localStorage.setItem(PLANS_KEY,JSON.stringify(plans));syncPush();}
function fmtDate(date){return date.toISOString().slice(0,10);}
function getWeekday(date){return ['日','一','二','三','四','五','六'][date.getDay()];}
function isTodayDate(text){return text===fmtDate(new Date());}
function initT6(){
  const sel=eid('t6law');
  if(!sel.children.length){
    Object.keys(LAWS).forEach(l=>{const o=document.createElement('option');o.value=l;o.textContent=l;sel.appendChild(o);});
  }
  if(!eid('t6start').value){eid('t6start').value=fmtDate(new Date());}
  renderPlans();
}
function createPlan(){
  const law=eid('t6law').value;
  const perDay=Math.max(1,parseInt(eid('t6count').value)||5);
  const startDate=eid('t6start').value||fmtDate(new Date());
  if(!law||!LAWS[law]){alert('請選擇要練習的法律');return;}
  const arts=LAWS[law];
  const plan={id:`plan_${Date.now()}_${Math.floor(Math.random()*1000)}`,law,perDay,startDate,createdAt:new Date().toISOString(),days:[]};

  // 第一輪：先算出每天要背的新條文範圍
  const contentDays=[];
  let next=1;
  let dayNo=1;
  while(next<=arts.length){
    const newFrom=next;
    const newTo=Math.min(arts.length,next+perDay-1);
    contentDays.push({dayNo,newFrom,newTo});
    next=newTo+1;
    dayNo++;
  }

  // 記憶曲線複習日：背完後第1、3、7、30天各複習一次
  // 進度表要延伸到最後一批新條文的第30天複習為止
  const totalDays=contentDays.length+Math.max(...REVIEW_OFFSETS);
  const contentByDayNo={};
  contentDays.forEach(cd=>{contentByDayNo[cd.dayNo]=cd;});

  let date=new Date(`${startDate}T00:00:00`);
  for(let d=1;d<=totalDays;d++){
    const cd=contentByDayNo[d];
    plan.days.push({
      id:`${plan.id}_day_${d}`,
      dayNo:d,
      date:fmtDate(new Date(date)),
      weekday:getWeekday(date),
      newFrom:cd?cd.newFrom:null,
      newTo:cd?cd.newTo:null,
      reviews:[],
      completed:false,
      completedAt:'',
    });
    date.setDate(date.getDate()+1);
  }

  // 第二輪：把每批新條文依記憶曲線排入對應的複習日
  contentDays.forEach(cd=>{
    REVIEW_OFFSETS.forEach(offset=>{
      const targetDayNo=cd.dayNo+offset;
      if(targetDayNo>totalDays)return;
      plan.days[targetDayNo-1].reviews.push({
        offset,
        sourceDayNo:cd.dayNo,
        sourceDate:plan.days[cd.dayNo-1].date,
        from:cd.newFrom,
        to:cd.newTo,
      });
    });
  });

  const plans=getPlans();
  plans.push(plan);
  setPlans(plans);
  renderPlans();
  ST('t6');
}
function resetPlans(){
  if(!confirm('確定重設所有計畫？'))return;
  setPlans([]);
  renderPlans();
}
function deletePlan(planId){
  const plans=getPlans();
  const plan=plans.find(p=>p.id===planId);
  if(!plan){alert('找不到該計畫，可能已被刪除。');renderPlans();return;}
  if(!confirm(`確定刪除「${plan.law}」計畫（開始日期 ${plan.startDate}）？此操作無法復原。`))return;
  if(T6.planId===planId){
    closeT6Practice();
    resetT6State();
  }
  setPlans(plans.filter(p=>p.id!==planId));
  renderPlans();
}
function reviewLineText(r){
  return `複習第${r.from}～${r.to}條（第${r.sourceDayNo}天內容・第${r.offset}次複習）`;
}
function renderTodayReminder(plans){
  const box=eid('t6reminder');
  const today=fmtDate(new Date());
  const items=[];
  plans.forEach(p=>{
    const day=p.days.find(d=>d.date===today);
    if(!day)return;
    const reviews=[...(day.reviews||[])].sort((a,b)=>a.sourceDayNo-b.sourceDayNo);
    reviews.forEach(r=>{
      items.push(`<div class="reminder-item"><strong>${eh(p.law)}</strong>：${reviewLineText(r)}</div>`);
    });
  });
  if(!items.length){box.innerHTML='';return;}
  box.innerHTML=`<div class="reminder-box"><h4>🔔 今日複習提醒</h4>${items.join('')}</div>`;
}
function renderPlans(){
  const plans=getPlans();
  const wrap=eid('t6plans');
  renderTodayReminder(plans);
  if(!plans.length){wrap.innerHTML='<div class="card" style="text-align:center;color:#9C8778">尚無計畫，請先建立計畫。</div>';return;}
  wrap.innerHTML=plans.map(p=>{
    const doneCount=p.days.filter(d=>d.completed).length;
    const header=`<div class="plan-card-toolbar"><strong>${p.law}</strong><div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap"><span class="plan-card-summary">每天 ${p.perDay} 條，開始 ${p.startDate}，共 ${p.days.length} 天，已完成 ${doneCount} 天</span><button class="btn bd" onclick="deletePlan('${p.id}')">刪除此計畫</button></div></div>`;
    const body=p.days.map(d=>{
      const statusClass=d.completed?'completed':(isTodayDate(d.date)?'today':'pending');
      const statusText=d.completed?`已完成 ${d.completedAt}`:(isTodayDate(d.date)?'今天':'未完成');
      const lines=[];
      if(d.newFrom!=null)lines.push(`<div class="plan-summary">背第${d.newFrom}～${d.newTo}條</div>`);
      [...(d.reviews||[])].sort((a,b)=>a.sourceDayNo-b.sourceDayNo).forEach(r=>{
        lines.push(`<div class="plan-review-summary">${reviewLineText(r)}</div>`);
      });
      if(!lines.length)lines.push('<div class="plan-summary">本日無安排背誦或複習</div>');
      return `<div class="plan-day"><div><strong>第${d.dayNo}天（${d.weekday}）</strong>${lines.join('')}</div><div class="plan-actions"><button class="btn bp" onclick="startT6Practice('${p.id}','${d.id}')">開始今日練習</button><button class="btn bs" onclick="toggleT6Complete('${p.id}','${d.id}')">${d.completed?'取消完成':'今日完成'}</button><span class="status ${statusClass}">${statusText}</span></div></div>`;
    }).join('');
    return `<div class="card">${header}${body}</div>`;
  }).join('');
}
function toggleT6Complete(planId,dayId){
  const plans=getPlans();
  const plan=plans.find(p=>p.id===planId); if(!plan)return;
  const day=plan.days.find(d=>d.id===dayId); if(!day)return;
  day.completed=!day.completed;
  day.completedAt=day.completed?new Date().toLocaleDateString('zh-TW'):'';
  setPlans(plans);
  renderPlans();
}
function startT6Practice(planId,dayId){
  const plans=getPlans();
  const plan=plans.find(p=>p.id===planId); if(!plan){alert('找不到計畫');return;}
  const day=plan.days.find(d=>d.id===dayId); if(!day){alert('找不到該天進度');return;}
  const arts=LAWS[plan.law];
  const newArts=[];
  if(day.newFrom!=null&&day.newTo!=null){
    for(let n=day.newFrom;n<=day.newTo;n++){const a=arts.find(a=>parseInt(a.n,10)===n); if(a)newArts.push(a);}
  }
  const reviewArts=[];
  [...(day.reviews||[])].sort((a,b)=>a.sourceDayNo-b.sourceDayNo).forEach(r=>{
    for(let n=r.from;n<=r.to;n++){const a=arts.find(a=>parseInt(a.n,10)===n); if(a)reviewArts.push(a);}
  });
  if(!newArts.length&&!reviewArts.length){alert('今日無題目可練習');return;}
  T6={planId,dayId,stage:'read',readArts:newArts,readIdx:0,newQueue:newArts,reviewQueue:reviewArts,idx:0,results:{new:[],review:[]}};
  eid('t6practice').style.display='block';
  eid('t6summaryCard').style.display='none';
  eid('t6plans').scrollIntoView({behavior:'smooth'});
  const title=`${plan.law} 第${day.dayNo}天`;
  eid('t6pracTitle').textContent='今日練習';
  eid('t6pracSubtitle').textContent=`${day.date} ${day.weekday} - ${title}`;
  if(newArts.length){
    eid('t6readCard').style.display='block';
    eid('t6pracCard').style.display='none';
    t6RenderRead();
  } else {
    // 當天沒有新條文（例如只剩複習），直接進入默寫練習
    T6.stage='recite_review';
    eid('t6readCard').style.display='none';
    eid('t6pracCard').style.display='block';
    t6RenderRecite();
  }
  t6UpdateStageUI();
}

// ----- 第一階段：閱讀理解 -----
function t6RenderRead(){
  const plan=getPlans().find(p=>p.id===T6.planId); if(!plan)return;
  const art=T6.readArts[T6.readIdx]; if(!art)return;
  const l=plan.law,n=art.n;
  eid('t6readText').innerHTML=`<strong>第${eh(n)}條</strong><br>${eh(art.t)}`;
  eid('t6readStarBtn').textContent=isStarred(l,n)?'★':'☆';
  eid('t6readNoteBtn').textContent=hasNote(l,n)?'📝 已有筆記':'📝 新增筆記';
  eid('t6readNotePanel').style.display='none';
  eid('t6readCounter').textContent=`第 ${T6.readIdx+1} / ${T6.readArts.length} 條`;
  eid('t6readPrev').disabled=T6.readIdx===0;
  const isLast=T6.readIdx===T6.readArts.length-1;
  eid('t6readNext').style.display=isLast?'none':'inline-block';
  eid('t6readStartBtn').style.display=isLast?'inline-block':'none';
  t6UpdateStageUI();
}
function t6ReadPrev(){if(T6.readIdx>0){T6.readIdx--;t6RenderRead();}}
function t6ReadNext(){if(T6.readIdx<T6.readArts.length-1){T6.readIdx++;t6RenderRead();}}
function t6ReadToggleStar(){
  const plan=getPlans().find(p=>p.id===T6.planId); if(!plan)return;
  const art=T6.readArts[T6.readIdx]; if(!art)return;
  const s=getStar(),k=starKey(plan.law,art.n);
  if(s[k])delete s[k]; else s[k]={l:plan.law,n:art.n};
  setStar(s);
  eid('t6readStarBtn').textContent=isStarred(plan.law,art.n)?'★':'☆';
}
function t6ReadToggleNote(){
  const panel=eid('t6readNotePanel');
  if(panel.style.display==='block'){panel.style.display='none';return;}
  const plan=getPlans().find(p=>p.id===T6.planId); if(!plan)return;
  const art=T6.readArts[T6.readIdx]; if(!art)return;
  const note=getNotes()[noteKey(plan.law,art.n)]||{};
  eid('t6readNoteText').value=note.text||'';
  panel.style.display='block';
}
function t6ReadSaveNote(){
  const plan=getPlans().find(p=>p.id===T6.planId); if(!plan)return;
  const art=T6.readArts[T6.readIdx]; if(!art)return;
  const text=eid('t6readNoteText').value.trim();
  const notes=getNotes(),k=noteKey(plan.law,art.n);
  if(text)notes[k]={l:plan.law,n:art.n,text,dt:new Date().toLocaleDateString('zh-TW')};
  else delete notes[k];
  setNotes(notes);
  eid('t6readNoteBtn').textContent=text?'📝 已有筆記':'📝 新增筆記';
  eid('t6readNotePanel').style.display='none';
}
function t6SkipRead(){t6StartRecite();}
function t6StartRecite(){
  T6.stage='recite_new';
  T6.idx=0;
  eid('t6readCard').style.display='none';
  eid('t6pracCard').style.display='block';
  t6RenderRecite();
}

// ----- 第二/三階段：默寫練習（新條文／複習） -----
function t6CurQueue(){return T6.stage==='recite_review'?T6.reviewQueue:T6.newQueue;}
function t6RenderRecite(){
  const queue=t6CurQueue();
  const art=queue[T6.idx]; if(!art)return;
  const stageLabel=T6.stage==='recite_review'?'複習默寫':'新條文默寫';
  eid('t6pracStage').textContent=stageLabel;
  eid('t6pracLabel').textContent=`第${art.n}條`;
  eid('t6pracText').innerHTML=`請默寫 <strong>第${eh(art.n)}條</strong> 的完整條文內容`;
  eid('t6pracCounter').textContent=`第 ${T6.idx+1} / ${queue.length} 條`;
  eid('t6pracInput').value='';
  eid('t6pracResult').style.display='none';
  const isLast=T6.idx+1>=queue.length;
  let nextLabel='下一題';
  if(isLast){
    nextLabel=(T6.stage==='recite_new'&&T6.reviewQueue.length)?'進入複習':'完成今日練習';
  }
  eid('t6pracNextBtn').textContent=nextLabel;
  t6UpdateStageUI();
}
function t6Check(){
  const queue=t6CurQueue();
  const art=queue[T6.idx]; if(!art)return;
  const u=eid('t6pracInput').value.trim();
  if(!u){alert('請輸入答案後再比對');return;}
  const c=art.t.trim();
  const d=buildDiff(u,c);
  const resKey=T6.stage==='recite_review'?'review':'new';
  T6.results[resKey][T6.idx]={artNo:art.n,cnt:d.cnt};
  eid('t6pracResult').style.display='block';
  eid('t6pracResult').innerHTML=`<div class="diff-block"><h4>比對結果</h4><div class="diff-row"><span class="diff-tag">您的答案</span><span class="diff-text">${d.h1}</span></div><div class="diff-row"><span class="diff-tag">正確答案</span><span class="diff-text">${d.h2}</span></div><div class="diff-cnt">共差異 ${d.cnt} 處</div></div>`;
}
function t6ShowAnswer(){
  const queue=t6CurQueue();
  const art=queue[T6.idx]; if(!art)return;
  eid('t6pracResult').style.display='block';
  eid('t6pracResult').innerHTML=`<div class="adisp" style="background:#FFF3E0;border:1px solid #E8C9A0"><strong>答案：</strong><br>${eh(art.t)}</div>`;
}
function t6Next(){
  const queue=t6CurQueue();
  if(T6.idx+1<queue.length){
    T6.idx++;
    t6RenderRecite();
    return;
  }
  if(T6.stage==='recite_new'&&T6.reviewQueue.length){
    T6.stage='recite_review';
    T6.idx=0;
    t6RenderRecite();
    return;
  }
  t6Finish();
}

// ----- 第四階段：今日成績總結 -----
function t6Finish(){
  const plans=getPlans();
  const plan=plans.find(p=>p.id===T6.planId); if(!plan)return;
  const day=plan.days.find(d=>d.id===T6.dayId); if(!day)return;
  day.completed=true;
  day.completedAt=new Date().toLocaleDateString('zh-TW');
  setPlans(plans);
  renderPlans();
  T6.stage='summary';
  eid('t6readCard').style.display='none';
  eid('t6pracCard').style.display='none';
  eid('t6summaryCard').style.display='block';
  const newRes=T6.results.new.filter(Boolean);
  const reviewRes=T6.results.review.filter(Boolean);
  const all=[...newRes,...reviewRes];
  const perfect=all.filter(r=>r.cnt===0).length;
  const totalDiff=all.reduce((s,r)=>s+r.cnt,0);
  eid('t6summaryCard').innerHTML=`
    <h3 style="margin-bottom:12px">🎉 今日練習完成！</h3>
    <div style="font-size:15px;line-height:2;text-align:left;display:inline-block">
      <div>新條文默寫：${T6.newQueue.length} 條</div>
      <div>複習條文：${T6.reviewQueue.length} 條</div>
      <div>完全正確：${perfect} / ${all.length} 條</div>
      <div>總差異字數：${totalDiff} 處</div>
    </div>
    <div style="margin-top:16px"><button class="btn bp" onclick="closeT6Practice()">回進度表</button></div>
  `;
  t6UpdateStageUI();
}

// ----- 階段進度顯示 -----
function t6UpdateStageUI(){
  const labels={read:'第一階段：閱讀理解',recite_new:'第二階段：默寫練習',recite_review:'第三階段：複習舊條文',summary:'✅ 已完成'};
  eid('t6stageBadge').textContent=labels[T6.stage]||'';
  const order=['read','recite_new','recite_review','summary'];
  const steps=[{key:'read',label:'閱讀理解'},{key:'recite_new',label:'默寫練習'}];
  if(T6.reviewQueue.length)steps.push({key:'recite_review',label:'複習'});
  const curIdx=order.indexOf(T6.stage);
  eid('t6stageSteps').innerHTML=steps.map(s=>{
    const sIdx=order.indexOf(s.key);
    const done=T6.stage==='summary'||sIdx<curIdx;
    const active=s.key===T6.stage;
    const icon=done?'✅':(active?'▶':'○');
    return `<span style="margin-right:8px;${active?'font-weight:bold;color:#8B5E3C':'color:#9C8778'}">${icon} ${s.label}</span>`;
  }).join('');
}
function closeT6Practice(){
  eid('t6practice').style.display='none';
}

const SL='law_star_v1';
function getStar(){return JSON.parse(localStorage.getItem(SL)||'{}');}
function setStar(o){localStorage.setItem(SL,JSON.stringify(o));syncPush();}
function starKey(l,n){return `${l}|${n}`;}
function isStarred(l,n){return !!getStar()[starKey(l,n)];}

function togStar1(){
  if(!S1.cur)return;
  const {l,a}=S1.cur;
  const s=getStar(),k=starKey(l,a.n);
  if(s[k])delete s[k]; else s[k]={l,n:a.n};
  setStar(s);
  eid('sb1').textContent=isStarred(l,a.n)?'★':'☆';
}

function togStar2(){
  if(!S2.qz.length)return;
  const q=S2.qz[S2.idx];
  const s=getStar(),k=starKey(q.l,q.a.n);
  if(s[k])delete s[k]; else s[k]={l:q.l,n:q.a.n};
  setStar(s);
  eid('sb2').textContent=isStarred(q.l,q.a.n)?'★':'☆';
}

function rendStar(){
  const ents=Object.values(getStar());
  if(!ents.length){eid('t4star').innerHTML='<p style="color:#9C8778">尚無星號標記題目。</p>';return;}
  eid('t4star').innerHTML=ents.map(e=>{
    const art=LAWS[e.l]?.find(a=>a.n===e.n);
    if(!art)return '';
    return `<div class="ee"><div style="display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap"><div><strong>${e.l}</strong> 第${e.n}條</div><button class="star-btn" title="取消標記" onclick="unstar('${e.l}','${e.n}')">★</button></div><div style="margin-top:8px;font-size:13px;color:#795548;white-space:pre-wrap;background:#FFF3DF;padding:8px;border-radius:4px;line-height:1.8">${eh(art.t)}</div></div>`;
  }).filter(Boolean).join('');
}

function unstar(l,n){
  const s=getStar();
  delete s[starKey(l,n)];
  setStar(s);
  rendStar();
}

function clrStar(){
  if(!confirm('確定取消所有星號標記？'))return;
  setStar({});
  rendStar();
}

function pracStar(){
  const ents=Object.values(getStar());
  if(!ents.length){alert('尚無星號標記題目');return;}
  const pool=ents.map(e=>({l:e.l,a:LAWS[e.l]?.find(a=>a.n===e.n)})).filter(x=>x.a);
  if(!pool.length){alert('找不到對應條文');return;}
  S1.pool=pool;S1.cur=null;
  eid('t1art').style.display='none';
  eid('t1res').style.display='none';
  ST('t1');
  alert(`已載入 ${pool.length} 條星號標記題目，請點擊「抽題」開始練習。`);
}

let auth,db,currentUser=null,unsubscribeSnapshot=null,pushTimer=null;

function collectLocalState(){return{stars:getStar(),notes:getNotes(),errlog:getErrLog(),plans:getPlans()};}

function mergeMaps(cloud,local){return{...(cloud||{}),...(local||{})};}

function mergePlans(cloudArr,localArr){
  cloudArr=cloudArr||[];localArr=localArr||[];
  const doneCount=p=>(p.days||[]).filter(d=>d.completed).length;
  const byId={};
  cloudArr.forEach(p=>{byId[p.id]=p;});
  localArr.forEach(p=>{
    const existing=byId[p.id];
    if(!existing||doneCount(p)>=doneCount(existing))byId[p.id]=p;
  });
  return Object.values(byId);
}

function mergeState(cloud,local){
  cloud=cloud||{};
  return{
    stars:mergeMaps(cloud.stars,local.stars),
    notes:mergeMaps(cloud.notes,local.notes),
    errlog:mergeMaps(cloud.errlog,local.errlog),
    plans:mergePlans(cloud.plans,local.plans),
  };
}

function setSyncStatus(text){const s=eid('syncStatus');if(s)s.textContent=text;}

function syncDocRef(){return db.collection('syncData').doc(currentUser.uid);}

function syncPush(){
  if(!cloudSyncEnabled||!currentUser)return;
  clearTimeout(pushTimer);
  pushTimer=setTimeout(()=>{
    syncDocRef().set({...collectLocalState(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()})
      .then(()=>setSyncStatus(`最後同步：${new Date().toLocaleTimeString('zh-TW')}`))
      .catch(e=>{console.error('雲端同步寫入失敗',e);setSyncStatus('同步失敗');});
  },500);
}

function receiveCloudUpdate(cloud){
  const merged=mergeState(cloud,collectLocalState());
  localStorage.setItem(SL,JSON.stringify(merged.stars));
  localStorage.setItem(NL,JSON.stringify(merged.notes));
  localStorage.setItem(EL,JSON.stringify(merged.errlog));
  localStorage.setItem(PLANS_KEY,JSON.stringify(merged.plans));
  rendStar();rendNotes();rendLog();renderPlans();
  setSyncStatus(`最後同步：${new Date().toLocaleTimeString('zh-TW')}`);
}

function startCloudSync(){
  syncDocRef().get().then(snap=>{
    receiveCloudUpdate(snap.exists?snap.data():null);
    syncPush();
    unsubscribeSnapshot=syncDocRef().onSnapshot(snap=>{
      if(snap.metadata.hasPendingWrites)return;
      receiveCloudUpdate(snap.data());
    });
  }).catch(e=>{console.error('雲端同步讀取失敗',e);setSyncStatus('同步失敗');});
}

function stopCloudSync(){
  if(unsubscribeSnapshot){unsubscribeSnapshot();unsubscribeSnapshot=null;}
}

function updateAuthUI(){
  const box=eid('authBox');
  if(!box||!cloudSyncEnabled){if(box)box.innerHTML='';return;}
  if(currentUser){
    box.innerHTML=`✅ 已登入同步：${eh(currentUser.email||currentUser.displayName||'')} <button class="note-btn" onclick="signOutUser()">登出</button> <span id="syncStatus" style="color:#9C8778"></span>`;
  }else{
    box.innerHTML=`<button class="note-btn" onclick="signIn()">🔗 使用 Google 登入以同步進度</button>`;
  }
}

function isMobileBrowser(){
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
}

function signIn(){
  if(!cloudSyncEnabled){alert('尚未設定 Firebase，雲端同步功能未啟用');return;}
  const provider=new firebase.auth.GoogleAuthProvider();
  // 手機瀏覽器（尤其 iOS Safari）常因隱私保護機制擋掉彈出視窗登入，改用整頁跳轉較穩定
  if(isMobileBrowser()){
    auth.signInWithRedirect(provider);
  }else{
    auth.signInWithPopup(provider).catch(e=>alert('登入失敗：'+e.message));
  }
}
function signOutUser(){if(auth)auth.signOut();}

if(cloudSyncEnabled){
  firebase.initializeApp(firebaseConfig);
  auth=firebase.auth();
  db=firebase.firestore();
  auth.getRedirectResult().catch(e=>alert('登入失敗：'+e.message));
  auth.onAuthStateChanged(user=>{
    currentUser=user;
    updateAuthUI();
    if(user)startCloudSync();else stopCloudSync();
  });
}else{
  console.info('尚未設定 Firebase config，雲端同步功能停用（僅使用本機儲存）。');
}

// ===== INIT =====
function init(){
  const sel=eid('t2sel');
  Object.keys(LAWS).forEach(l=>{
    const o=document.createElement('option');
    o.value=l;o.textContent=l;sel.appendChild(o);
  });
  initT1();
}
init();
</script>
